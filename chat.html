<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolarSavingsAI Chat Assistant</title>
<style>
  :root {
    --color-primary: #00f0ff;
    --color-primary-light: #67f7ff;
    --color-secondary: #ffbe0b;
    --color-bg: #0a0e17;
    --color-bg-alt: #111827;
    --color-border: rgba(0, 240, 255, 0.18);
    --color-text: #e0e6ed;
    --color-muted: #9aa7bd;
    --glass-bg: rgba(17, 24, 39, 0.76);
    --radius: 16px;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    background: radial-gradient(circle at 20% 0%, #142239 0%, #0a0e17 45%, #05070e 100%);
    color: var(--color-text);
  }

  .chat-page {
    min-height: 100vh;
    padding: 14px;
  }

  .chat-container {
    height: calc(100vh - 28px);
    max-width: 1100px;
    margin: 0 auto;
    border: 1px solid var(--color-border);
    background: var(--glass-bg);
    border-radius: 20px;
    box-shadow: 0 16px 55px rgba(0, 0, 0, 0.35);
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
  }

  .chat-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--color-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: rgba(10, 14, 23, 0.82);
  }

  .chat-title {
    margin: 0;
    font-size: 1rem;
    font-weight: 700;
  }

  .chat-subtitle {
    margin-top: 3px;
    font-size: 0.85rem;
    color: var(--color-muted);
  }

  .back-link {
    color: var(--color-primary);
    text-decoration: none;
    font-size: 0.9rem;
    white-space: nowrap;
  }

  .chat-window {
    overflow-y: auto;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: linear-gradient(180deg, rgba(17, 24, 39, 0.85), rgba(10, 14, 23, 0.92));
  }

  .message {
    max-width: min(85%, 760px);
    border-radius: var(--radius);
    padding: 10px 12px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-wrap: break-word;
    border: 1px solid transparent;
  }

  .message.user {
    align-self: flex-end;
    background: rgba(0, 240, 255, 0.13);
    border-color: rgba(0, 240, 255, 0.36);
  }

  .message.assistant {
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 255, 255, 0.09);
  }

  .message a {
    color: var(--color-primary-light);
  }

  .composer {
    border-top: 1px solid var(--color-border);
    background: rgba(10, 14, 23, 0.9);
    padding: 12px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: end;
  }

  .chat-input {
    min-height: 48px;
    max-height: 160px;
    resize: vertical;
    border-radius: 14px;
    border: 1px solid var(--color-border);
    background: rgba(255, 255, 255, 0.02);
    color: var(--color-text);
    padding: 11px 12px;
    font: inherit;
  }

  .chat-input:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.12);
  }

  .chat-send {
    height: 48px;
    border: 0;
    border-radius: 999px;
    padding: 0 18px;
    color: #05252c;
    font-weight: 700;
    font-size: 0.95rem;
    background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
    cursor: pointer;
  }

  .chat-send:disabled {
    opacity: 0.65;
    cursor: not-allowed;
  }

  @media (max-width: 720px) {
    .chat-page {
      padding: 0;
    }

    .chat-container {
      height: 100vh;
      border-radius: 0;
      border-left: 0;
      border-right: 0;
      max-width: none;
    }

    .chat-header {
      align-items: flex-start;
      flex-direction: column;
    }

    .composer {
      grid-template-columns: 1fr;
    }

    .chat-send {
      width: 100%;
    }
  }
</style>
</head>
<body>
  <div class="chat-page">
    <div class="chat-container">
      <header class="chat-header">
        <div>
          <h1 class="chat-title">SolarSavingsAI Assistant</h1>
          <div class="chat-subtitle">Ask about rebates, incentives, quotes, and solar options.</div>
        </div>
        <a class="back-link" href="/">Back to home</a>
      </header>

      <main id="chat-window" class="chat-window" aria-live="polite" aria-label="Chat messages"></main>

      <form id="chat-form" class="composer">
        <textarea id="user-input" class="chat-input" placeholder="Type your message... (Shift+Enter for new line)" required></textarea>
        <button type="submit" class="chat-send">Send</button>
      </form>
    </div>
  </div>

  <script src="/js/chat.js" defer></script>
</body>
</html>
