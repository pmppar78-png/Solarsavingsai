[build]
  command = "node scripts/build.js"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self)"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/chat.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# --- Canonical domain enforcement: www → non-www (single 301 hop) ---
# Netlify handles http→https at the CDN level via the "Force HTTPS" setting,
# so no separate https rule is required here.
[[redirects]]
  from = "https://www.solarsavingsai.com/*"
  to = "https://solarsavingsai.com/:splat"
  status = 301
  force = true

# --- Canonical URL form: /index.html → trailing-slash equivalent ---
# Prevents duplicate-content discovery via explicit index.html access. Force
# is required because the source files exist on disk under each route.
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

# Subdirectory index.html files exist on disk (every route is dir/index.html),
# so without force Netlify serves /path/index.html as a duplicate 200. Force
# guarantees a single clean 301 to the canonical trailing-slash URL, matching
# the root rule above and keeping any indexed *.html/index.html out of the index.
[[redirects]]
  from = "/*/index.html"
  to = "/:splat/"
  status = 301
  force = true

# --- Hub pages (states, solar-rebates, comparisons) ---
# Each hub is a directory with index.html. Netlify natively serves
# /states/ from the directory. The non-slash form gets Netlify's default
# trailing-slash 301, so no explicit rule is needed for it.

[[redirects]]
  from = "/guides"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/blog"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/blog/*"
  to = "/404.html"
  status = 410
  force = true
