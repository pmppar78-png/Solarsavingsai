[build]
  command = "node scripts/build.js"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self)"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/chat.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# --- Canonical domain enforcement: www → non-www (single 301 hop) ---
# Netlify handles http→https at the CDN level via the "Force HTTPS" setting,
# so no separate https rule is required here.
[[redirects]]
  from = "https://www.solarsavingsai.com/*"
  to = "https://solarsavingsai.com/:splat"
  status = 301
  force = true

# --- Canonical URL form: /index.html → trailing-slash equivalent ---
# Prevents duplicate-content discovery via explicit index.html access. Force
# is required because the source files exist on disk under each route.
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/*/index.html"
  to = "/:splat/"
  status = 301
  force = true

# --- Restored public hubs: serve clean URLs directly with 200 rewrites ---
# These legacy public URLs were previously forced to 410 after being reported
# as redirecting pages. They are now indexable hub pages with slashless
# canonicals, and the slash variants are internally rewritten to the same
# content so crawlers do not hit a redirect before the final page.
[[redirects]]
  from = "/states"
  to = "/states.html"
  status = 200
  force = true

[[redirects]]
  from = "/states/"
  to = "/states.html"
  status = 200
  force = true

[[redirects]]
  from = "/solar-rebates"
  to = "/solar-rebates.html"
  status = 200
  force = true

[[redirects]]
  from = "/solar-rebates/"
  to = "/solar-rebates.html"
  status = 200
  force = true

[[redirects]]
  from = "/comparisons"
  to = "/comparisons.html"
  status = 200
  force = true

[[redirects]]
  from = "/comparisons/"
  to = "/comparisons.html"
  status = 200
  force = true

[[redirects]]
  from = "/guides"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/blog"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/blog/*"
  to = "/404.html"
  status = 410
  force = true
