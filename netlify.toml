[build]
  command = "node scripts/build.js"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self)"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- Redirect /index.html and /*/index.html to clean trailing-slash URLs ---
# Prevents duplicate content from explicit index.html access (force required
# because the files exist on disk).
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/*/index.html"
  to = "/:splat/"
  status = 301
  force = true

# --- Legacy / deprecated URL redirects ---
[[redirects]]
  from = "/states"
  to = "/#state-map"
  status = 301

[[redirects]]
  from = "/solar-rebates"
  to = "/#state-map"
  status = 301

[[redirects]]
  from = "/comparisons"
  to = "/compare/solar-panels-vs-grid-power/"
  status = 301

[[redirects]]
  from = "/guides"
  to = "/guide/complete-guide-home-solar/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/articles/"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/articles/"
  status = 301
