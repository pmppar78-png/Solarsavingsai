[build]
  command = "node scripts/build.js"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self)"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/chat.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# --- Canonical domain enforcement: www → non-www (single 301 hop) ---
# Netlify handles http→https at the CDN level via the "Force HTTPS" setting,
# so no separate https rule is required here.
[[redirects]]
  from = "https://www.solarsavingsai.com/*"
  to = "https://solarsavingsai.com/:splat"
  status = 301
  force = true

# --- Canonical URL form: /index.html → trailing-slash equivalent ---
# Prevents duplicate-content discovery via explicit index.html access. Force
# is required because the source files exist on disk under each route.
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/*/index.html"
  to = "/:splat/"
  status = 301
  force = true

# --- Removed legacy URLs: serve 410 Gone so Google permanently drops them ---
# These paths formerly 301-redirected, which Google flagged as
# "Page with redirect" in Search Console. 410 tells crawlers the URL is gone
# for good and is removed from the index faster than a 301 ever would be.
[[redirects]]
  from = "/states"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/solar-rebates"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/comparisons"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/guides"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/blog"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/blog/*"
  to = "/404.html"
  status = 410
  force = true
